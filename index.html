<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <title>Daily Stitch</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">

    <!-- Requires coi-serviceworker.js in the root directory for GitHub Pages compatibility -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-secondary: #AAAAAA;
            --accent: #E85D4E;
            --border: #333333;
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 10px 0 20px;
            color: var(--text);
        }

        #video-container {
            width: 100%;
            flex-grow: 1;
            max-width: 450px;
            background-color: #000;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            padding: 25px 0 calc(var(--safe-area-inset-bottom) + 10px);
            justify-content: space-between;
        }

        button {
            background-color: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.96);
            background-color: #2a2a2a;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #record-btn {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        #record-btn.recording {
            background-color: transparent;
            border-color: var(--accent);
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(232, 93, 78, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(232, 93, 78, 0); }
            100% { box-shadow: 0 0 0 0 rgba(232, 93, 78, 0); }
        }

        #status-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .hidden {
            opacity: 0 !important;
        }

        /* PWA Install Banner */
        #install-banner {
            position: fixed;
            top: 20px;
            width: calc(100% - 40px);
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transform: translateY(-150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #install-banner.show {
            transform: translateY(0);
        }

        #install-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            flex: none;
            width: auto;
        }
    </style>
</head>
<body>

    <div id="install-banner">
        <div>
            <strong>Daily Stitch</strong><br>
            <span style="font-size: 12px; color: var(--text-secondary);">Install app for offline use</span>
        </div>
        <button id="install-btn">Install</button>
    </div>

    <h1>Daily Stitch</h1>
    
    <div id="video-container">
        <div id="status-overlay">Initializing camera...</div>
        <video id="video-preview" autoplay muted playsinline></video>
    </div>
    
    <div class="controls">
        <button id="record-btn">
            <div style="width:12px;height:12px;border-radius:50%;background:currentColor;"></div>
            Record 3s
        </button>
        <button id="merge-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Stitch & Save
        </button>
    </div>

    <script>
        // PWA Installation Logic
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.add('show');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.classList.remove('show');
                }
                deferredPrompt = null;
            }
        });

        // App Logic
        const video = document.getElementById('video-preview');
        const recordBtn = document.getElementById('record-btn');
        const mergeBtn = document.getElementById('merge-btn');
        const statusOverlay = document.getElementById('status-overlay');
        
        let mediaRecorder;
        let db;
        let selectedMimeType = '';

        function setStatus(text, hideAfter = 0) {
            statusOverlay.innerText = text;
            statusOverlay.classList.remove('hidden');
            if (hideAfter > 0) {
                setTimeout(() => statusOverlay.classList.add('hidden'), hideAfter);
            }
        }

        // Determine the best standardized codec across devices
        function getSupportedMimeType() {
            const possibleTypes = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',
                'video/webm',
                'video/mp4;codecs=h264,aac',
                'video/mp4'
            ];
            for (let type of possibleTypes) {
                if (MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }
            return ''; 
        }

        // Initialize Database
        const request = indexedDB.open("VideoDiaryDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("clips", { autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; };

        // Initialize Camera
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
            audio: true 
        })
        .then(stream => {
            video.srcObject = stream;
            setStatus("Ready to record", 2000);
            
            selectedMimeType = getSupportedMimeType();
            const options = selectedMimeType ? { mimeType: selectedMimeType } : {};
            
            mediaRecorder = new MediaRecorder(stream, options);
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) {
                    const tx = db.transaction("clips", "readwrite");
                    tx.objectStore("clips").add(e.data);
                }
            };
        })
        .catch(err => {
            setStatus("Camera access required.");
            console.error(err);
        });

        // Record Button Logic
        recordBtn.addEventListener('click', () => {
            if (!mediaRecorder || mediaRecorder.state === 'recording') return;
            
            mediaRecorder.start();
            setStatus("Recording...");
            recordBtn.classList.add('recording');
            recordBtn.innerHTML = "Recording...";
            mergeBtn.disabled = true;
            
            setTimeout(() => {
                mediaRecorder.stop();
                setStatus("Clip saved!", 2000);
                recordBtn.classList.remove('recording');
                recordBtn.innerHTML = '<div style="width:12px;height:12px;border-radius:50%;background:currentColor;"></div> Record 3s';
                mergeBtn.disabled = false;
            }, 3000);
        });

        // Merge Button Logic
        mergeBtn.addEventListener('click', async () => {
            mergeBtn.disabled = true;
            recordBtn.disabled = true;
            
            try {
                setStatus("Warming up FFmpeg engine...");
                
                const { FFmpeg } = FFmpegWASM;
                const ffmpeg = new FFmpeg();
                
                // Track progress
                ffmpeg.on('progress', ({ progress }) => {
                    setStatus(`Stitching: ${Math.round(progress * 100)}%`);
                });
                
                await ffmpeg.load();
                
                setStatus("Reading clips from storage...");
                const tx = db.transaction("clips", "readonly");
                const store = tx.objectStore("clips");
                const getRequest = store.getAll();
                
                getRequest.onsuccess = async (e) => {
                    const clips = e.target.result;
                    if (clips.length === 0) {
                        setStatus("No clips found to stitch.", 3000);
                        mergeBtn.disabled = false;
                        recordBtn.disabled = false;
                        return;
                    }
                    
                    setStatus(`Processing ${clips.length} clip(s)...`);
                    let listContent = "";
                    
                    // Determine file extension based on mime type
                    const ext = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
                    
                    for (let i = 0; i < clips.length; i++) {
                        const fileName = `clip${i}.${ext}`;
                        const arrayBuffer = await clips[i].arrayBuffer();
                        await ffmpeg.writeFile(fileName, new Uint8Array(arrayBuffer));
                        listContent += `file '${fileName}'\n`;
                    }
                    
                    await ffmpeg.writeFile('list.txt', listContent);
                    
                    setStatus("Merging clips...");
                    // Fast concatenation using copy codec since all clips are identical format
                    await ffmpeg.exec(['-f', 'concat', '-safe', '0', '-i', 'list.txt', '-c', 'copy', 'output.mp4']);
                    
                    const data = await ffmpeg.readFile('output.mp4');
                    const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                    
                    // Trigger download
                    const a = document.createElement('a');
                    a.href = videoUrl;
                    a.download = `Daily_Stitch_${new Date().toISOString().split('T')[0]}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    setStatus("Export complete! Storage cleared.", 3000);
                    
                    // Clear storage after successful export
                    const clearTx = db.transaction("clips", "readwrite");
                    clearTx.objectStore("clips").clear();
                    
                    mergeBtn.disabled = false;
                    recordBtn.disabled = false;
                };
                
                getRequest.onerror = () => {
                    setStatus("Error reading clips.", 3000);
                    mergeBtn.disabled = false;
                    recordBtn.disabled = false;
                }
            } catch (err) {
                setStatus("Error during merge. See console.", 4000);
                console.error(err);
                mergeBtn.disabled = false;
                recordBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
