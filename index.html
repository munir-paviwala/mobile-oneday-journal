<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Stitch</title>
    <!-- Requires coi-serviceworker.js in the root directory for GitHub Pages compatibility -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        :root {
            --bg: #F5EFEB;
            --text: #2D2A26;
            --accent: #E85D4E;
            --border: #2D2A26;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        #video-container {
            width: 100%;
            max-width: 320px;
            border: 4px solid var(--border);
            background-color: #000;
            box-shadow: 6px 6px 0px var(--border);
            margin-bottom: 30px;
            position: relative;
        }
        #video-preview {
            width: 100%;
            display: block;
        }
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            justify-content: space-between;
        }
        button {
            background-color: var(--bg);
            color: var(--text);
            border: 3px solid var(--border);
            padding: 12px 15px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border);
            transition: transform 0.1s, box-shadow 0.1s;
            flex-grow: 1;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }
        #record-btn {
            background-color: var(--accent);
            color: #fff;
        }
        #status {
            margin-top: 30px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Daily Stitch</h1>
    
    <div id="video-container">
        <video id="video-preview" autoplay muted playsinline></video>
    </div>
    
    <div class="controls">
        <button id="record-btn">REC (3s)</button>
        <button id="merge-btn">Stitch & Save</button>
    </div>
    
    <div id="status">Initializing camera...</div>

    <script>
        const video = document.getElementById('video-preview');
        const recordBtn = document.getElementById('record-btn');
        const mergeBtn = document.getElementById('merge-btn');
        const statusText = document.getElementById('status');
        
        let mediaRecorder;
        let db;

        const request = indexedDB.open("VideoDiaryDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("clips", { autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; };

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "System ready.";
                
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) {
                        const tx = db.transaction("clips", "readwrite");
                        tx.objectStore("clips").add(e.data);
                    }
                };
            })
            .catch(err => {
                statusText.innerText = "Camera access required.";
            });

        recordBtn.addEventListener('click', () => {
            if (mediaRecorder.state === 'recording') return;
            
            mediaRecorder.start();
            statusText.innerText = "Recording...";
            recordBtn.style.backgroundColor = "#2D2A26";
            
            setTimeout(() => {
                mediaRecorder.stop();
                statusText.innerText = "Clip logged.";
                recordBtn.style.backgroundColor = "var(--accent)";
            }, 3000);
        });

        mergeBtn.addEventListener('click', async () => {
            statusText.innerText = "Loading FFmpeg engine...";
            
            const { FFmpeg } = FFmpegWASM;
            const ffmpeg = new FFmpeg();
            
            await ffmpeg.load();
            
            statusText.innerText = "Accessing local storage...";
            const tx = db.transaction("clips", "readonly");
            const store = tx.objectStore("clips");
            const getRequest = store.getAll();
            
            getRequest.onsuccess = async (e) => {
                const clips = e.target.result;
                if (clips.length === 0) {
                    statusText.innerText = "No clips found for today.";
                    return;
                }
                
                statusText.innerText = `Stitching ${clips.length} clips...`;
                let listContent = "";
                
                for (let i = 0; i < clips.length; i++) {
                    const fileName = `clip${i}.webm`;
                    const arrayBuffer = await clips[i].arrayBuffer();
                    await ffmpeg.writeFile(fileName, new Uint8Array(arrayBuffer));
                    listContent += `file '${fileName}'\n`;
                }
                
                await ffmpeg.writeFile('list.txt', listContent);
                
                await ffmpeg.exec(['-f', 'concat', '-safe', '0', '-i', 'list.txt', '-c', 'copy', 'output.mp4']);
                
                const data = await ffmpeg.readFile('output.mp4');
                const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const a = document.createElement('a');
                a.href = videoUrl;
                a.download = `Stitch_${new Date().toISOString().split('T')[0]}.mp4`;
                a.click();
                
                statusText.innerText = "Export complete. Storage cleared.";
                const clearTx = db.transaction("clips", "readwrite");
                clearTx.objectStore("clips").clear();
            };
        });
    </script>
</body>
</html>
